<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPS FETCH</title>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1.2rem 2rem; display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
    header h1 { font-size: 1.4rem; }
    header p  { font-size: 0.8rem; opacity: 0.7; }
    main { max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; }

    /* 2カラムレイアウト（左：グラフ / 右：テーブル） */
    .layout { display: flex; gap: 1.5rem; align-items: flex-start; }
    .chart-col { flex: 1 1 0; min-width: 0; }
    .table-col { flex: 0 0 320px; }

    /* サマリーテーブル */
    .summary-card {
      background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
      overflow: auto; position: sticky; top: 1rem; max-height: calc(100vh - 2rem);
    }
    .summary-table th { position: sticky; top: 0; z-index: 1; }

    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .table-col { flex: none; width: 100%; }
      .summary-card { position: static; max-height: none; }
    }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .summary-table th {
      background: #1a1a2e; color: #fff; padding: 0.5rem 0.7rem;
      text-align: right; font-weight: 500; white-space: nowrap;
    }
    .summary-table th:first-child { text-align: left; }
    .summary-table td {
      padding: 0.5rem 0.7rem; border-bottom: 1px solid #f0f0f0;
      text-align: right; white-space: nowrap;
    }
    .summary-table td:first-child { text-align: left; font-weight: 600; }
    .summary-table tr { cursor: pointer; transition: background 0.12s; }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table tr:hover td { background: #eff6ff; }
    .summary-table tr.active td { background: #dbeafe; }
    .up   { color: #16a34a; font-weight: 600; }
    .down { color: #dc2626; font-weight: 600; }
    .diff { font-size: 0.75rem; margin-left: 0.3rem; opacity: 0.85; }

    /* チャートカード */
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 0; padding: 1.5rem; display: none; }
    .card.active { display: block; }
    .card-header { display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.05rem; margin-right: 0.4rem; }
    .company-name { font-size: 0.85rem; color: #6b7280; margin-right: 0.4rem; }
    .badge {
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 999px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    }
    .badge.analyst { background: #fdf2f8; color: #9d174d; border-color: #f9a8d4; }
    .badge.soon { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .badge.per  { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }

    .chart-wrap { height: 260px; }
    .chart-toggle { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
    .chart-toggle button {
      padding: 0.25rem 0.8rem; border-radius: 5px; border: 1.5px solid #d1d5db;
      background: #fff; color: #374151; font-size: 0.8rem; cursor: pointer;
    }
    .chart-toggle button.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

    .price-section { margin-top: 0.4rem; border-top: none; padding-top: 0; }
    .price-section h3 { font-size: 0.85rem; color: #666; margin-bottom: 0.4rem; }
    .price-wrap { height: 200px; position: relative; }

    .legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 0.6rem 0; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; cursor: pointer; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    #loading { text-align: center; padding: 3rem; color: #666; }
    .error { color: #c0392b; padding: 2rem; }
  </style>
</head>
<body>
<header>
  <h1>EPS FETCH</h1>
  <p id="subtitle">読み込み中...</p>
</header>
<main id="main">
  <div id="loading">データを読み込んでいます...</div>
</main>

<script>
const PERIOD_LABELS = { "0q": "今四半期", "+1q": "来四半期", "0y": "今年度", "+1y": "来年度" };
const PERIODS = ["0q", "+1q", "0y", "+1y"];
const COLORS = ["#2563eb", "#16a34a", "#dc2626", "#d97706", "#7c3aed", "#0891b2"];
const OHLC_KEYS = new Set(["o", "h", "l", "c", "v", "prev_close", "trailing_pe", "forward_pe"]);

function daysUntil(dateStr) {
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}

function earningsBadge(symbol, earningsDates) {
  const e = earningsDates[symbol];
  if (!e) return "";
  let html = "";
  if (e.prev) html += `<span class="badge">前回決算 ${e.prev}</span>`;
  if (e.next) {
    const days = daysUntil(e.next);
    const label = days < 0 ? `決算済 ${e.next}` : days === 0 ? `本日決算 ${e.next}` : `次回決算 ${e.next}（${days}日後）`;
    html += `<span class="${days >= 0 && days <= 14 ? "badge soon" : "badge"}">${label}</span>`;
  }
  return html;
}

function perBadges(symbol, latestEntry, perData) {
  const entry = latestEntry[symbol] || {};
  const trailing = entry.trailing_pe ?? (perData[symbol] || {}).trailing ?? null;
  const forward  = entry.forward_pe  ?? (perData[symbol] || {}).forward  ?? null;
  let html = "";
  if (trailing != null) html += `<span class="badge per">PER (LTM) ${trailing}x</span>`;
  if (forward  != null) html += `<span class="badge per">Forward PER ${forward}x</span>`;
  return html;
}

function analystBadge(symbol, perData) {
  const p = (perData || {})[symbol];
  if (!p || p.analysts == null) return "";
  return `<span class="badge analyst">アナリスト ${p.analysts}人</span>`;
}

function buildSummaryTable(symbols, history, earningsDates, perData) {
  const last = history[history.length - 1];

  // 各銘柄ごとに、直近のデータがある1つ前のエントリを探す
  function getPrevEntry(symbol) {
    for (let i = history.length - 2; i >= 0; i--) {
      if (history[i][symbol]) return history[i];
    }
    return null;
  }

  const wrap = document.createElement("div");
  wrap.className = "summary-card";

  const table = document.createElement("table");
  table.className = "summary-table";

  // ヘッダー
  const thead = document.createElement("thead");
  thead.innerHTML = `<tr>
    <th>銘柄</th>
    ${PERIODS.map(p => `<th>${PERIOD_LABELS[p] || p}</th>`).join("")}
  </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  symbols.forEach((symbol, i) => {
    const cur = last[symbol] || {};
    const prevEntry = getPrevEntry(symbol);
    const pre = prevEntry ? (prevEntry[symbol] || {}) : {};
    const prevDate = prevEntry ? prevEntry.date : null;
    const tr = document.createElement("tr");
    if (i === 0) tr.classList.add("active");
    tr.dataset.symbol = symbol;

    const tdSymbol = document.createElement("td");
    tdSymbol.textContent = symbol;
    tr.appendChild(tdSymbol);

    PERIODS.forEach(period => {
      const td = document.createElement("td");
      const val = cur[period];
      const preVal = pre[period];
      if (val == null) {
        td.textContent = "—";
      } else {
        const formatted = `$${val.toFixed(2)}`;
        const titleBase = prevDate ? `前回(${prevDate}): ${preVal != null ? "$" + preVal.toFixed(2) : "なし"}` : "比較データなし";
        td.title = titleBase;
        if (preVal != null && Math.abs(val - preVal) >= 0.001) {
          const diff = val - preVal;
          const sign = diff > 0 ? "+" : "";
          td.className = diff > 0 ? "up" : "down";
          td.innerHTML = `${formatted}<span class="diff">(${sign}${diff.toFixed(2)})</span>`;
        } else {
          td.textContent = formatted;
        }
      }
      tr.appendChild(td);
    });


    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  // 診断: 比較基準日を表示
  const firstSymbol = symbols[0];
  const diagEntry = getPrevEntry(firstSymbol);
  const info = document.createElement("p");
  info.style.cssText = "font-size:0.75rem;color:#888;padding:0.5rem 1rem;";
  if (diagEntry) {
    info.textContent = `前回比較: ${diagEntry.date} → ${last.date}（全 ${history.length} 日分）`;
  } else {
    info.textContent = `比較データなし（全 ${history.length} 日分 / データが1日分のみ）`;
  }

  wrap.appendChild(table);
  wrap.appendChild(info);
  return { wrap, tbody };
}

function buildPriceSection(symbol) {
  const section = document.createElement("div");
  section.className = "price-section";
  section.innerHTML = `
    <h3>株価推移</h3>
    <div class="price-wrap"><canvas id="price-${symbol}"></canvas></div>`;
  return section;
}

function buildPriceChart(symbol, history, earningsDates) {
  const data = history
    .filter(e => e[symbol]?.o != null && e[symbol]?.c != null)
    .map(e => ({
      date: e.date,
      o: e[symbol].o, h: e[symbol].h, l: e[symbol].l, c: e[symbol].c,
      v: e[symbol].v ?? null,
      up: e[symbol].c >= e[symbol].o,
    }));

  const xMin = history[0]?.date;
  const xMax = history[history.length - 1]?.date;

  // 株価軸は実データの高値・安値レンジに合わせる（0 始まりにしない）
  const lows  = data.map(d => d.l).filter(v => v != null);
  const highs = data.map(d => d.h).filter(v => v != null);
  const priceLo = lows.length  ? Math.min(...lows)  : 0;
  const priceHi = highs.length ? Math.max(...highs) : 1;
  const pricePad = (priceHi - priceLo) * 0.1 || 1;

  const annotations = {};
  const ed = (earningsDates || {})[symbol];
  const dates = data.map(d => d.date);
  const dataMin = dates[0] ?? null;
  const dataMax = dates[dates.length - 1] ?? null;
  if (ed?.prev && dataMin && dataMax && ed.prev >= dataMin && ed.prev <= dataMax) {
    annotations.prevEarnings = {
      type: "line", xMin: ed.prev, xMax: ed.prev,
      borderColor: "#f59e0b", borderWidth: 2, borderDash: [4, 4],
      label: { display: true, content: `前回決算 ${ed.prev}`, position: "start", backgroundColor: "#f59e0b", color: "#fff", font: { size: 10 }, padding: 3 },
    };
  }

  const UP = "#16a34a", DN = "#dc2626";
  return new Chart(document.getElementById(`price-${symbol}`), {
    type: "bar",
    data: { datasets: [
      {
        label: "_wick_h",
        data: data.map(d => ({ x: d.date, y: [Math.max(d.o, d.c), d.h] })),
        backgroundColor: data.map(d => d.up ? UP : DN),
        borderWidth: 0, borderSkipped: false, barThickness: 1,
        grouped: false, order: 1,
      },
      {
        label: "_wick_l",
        data: data.map(d => ({ x: d.date, y: [d.l, Math.min(d.o, d.c)] })),
        backgroundColor: data.map(d => d.up ? UP : DN),
        borderWidth: 0, borderSkipped: false, barThickness: 1,
        grouped: false, order: 1,
      },
      {
        label: "株価",
        data: data.map(d => ({ x: d.date, y: [d.o, d.c] })),
        backgroundColor: data.map(d => d.up ? "rgba(22,163,74,0.75)" : "rgba(220,38,38,0.75)"),
        borderColor:      data.map(d => d.up ? UP : DN),
        borderWidth: 1, borderSkipped: false,
        barPercentage: 0.6, categoryPercentage: 1.0,
        grouped: false, order: 0,
      },
      {
        label: "出来高",
        data: data.map(d => ({ x: d.date, y: d.v })),
        backgroundColor: data.map(d => d.up ? "rgba(22,163,74,0.25)" : "rgba(220,38,38,0.25)"),
        borderWidth: 0,
        barPercentage: 0.9, categoryPercentage: 1.0,
        grouped: false, order: 2,
        yAxisID: "yVol",
      },
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter: ctx => ctx.datasetIndex === 2 || ctx.datasetIndex === 3,
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 3) {
                const v = ctx.parsed.y;
                return v != null ? `出来高: ${(v / 1e6).toFixed(2)}M` : null;
              }
              const d = data[ctx.dataIndex];
              return d ? [`始値: $${d.o.toFixed(2)}`, `高値: $${d.h.toFixed(2)}`, `安値: $${d.l.toFixed(2)}`, `終値: $${d.c.toFixed(2)}`] : null;
            },
          },
        },
        annotation: { annotations },
      },
      scales: {
        x: {
          type: "time",
          min: xMin, max: xMax,
          time: { unit: "day", tooltipFormat: "yyyy-MM-dd", displayFormats: { day: "MM/dd" } },
          ticks: { display: false },
          border: { display: false },
        },
        y: {
          position: "left",
          min: priceLo - pricePad,
          max: priceHi + pricePad,
          title: { display: true, text: "株価 ($)" },
          ticks: { callback: v => "$" + v.toFixed(0) },
        },
        yVol: {
          position: "right",
          display: data.some(d => d.v != null),
          grid: { drawOnChartArea: false },
          max: (Math.max(0, ...data.map(d => d.v ?? 0)) || 1) * 4,
          min: 0,
          ticks: { callback: v => (v / 1e6).toFixed(0) + "M", maxTicksLimit: 4 },
          title: { display: false },
        },
      },
    },
  });
}

function buildChart(canvasId, history, symbol, earningsDates) {
  const periodArrays = {};
  const perArrays = { trailing_pe: [], forward_pe: [] };

  history.forEach(entry => {
    const d = entry[symbol];
    if (!d) return;
    Object.entries(d).forEach(([k, v]) => {
      if (k === "trailing_pe" || k === "forward_pe") {
        if (v !== null) perArrays[k].push({ x: entry.date, y: v });
      } else if (!OHLC_KEYS.has(k) && PERIOD_LABELS[k]) {
        if (!periodArrays[k]) periodArrays[k] = [];
        if (v !== null) periodArrays[k].push({ x: entry.date, y: v });
      }
    });
  });

  const QUARTERLY = new Set(["0q", "+1q"]);
  const epsDatasets = Object.entries(periodArrays).map(([period, data], i) => ({
    label: PERIOD_LABELS[period] || period,
    data,
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + "22",
    tension: 0.3, pointRadius: 4, pointHoverRadius: 6,
    yAxisID: QUARTERLY.has(period) ? "yQ" : "yA",
    _mode: "eps",
  }));

  const PER_COLORS = { trailing_pe: "#7c3aed", forward_pe: "#0891b2" };
  const PER_LABELS = { trailing_pe: "PER(LTM)", forward_pe: "Forward PER" };
  const perDatasets = Object.entries(perArrays).map(([k, data]) => ({
    label: PER_LABELS[k],
    data,
    borderColor: PER_COLORS[k],
    backgroundColor: PER_COLORS[k] + "22",
    tension: 0.3, pointRadius: 4, pointHoverRadius: 6,
    yAxisID: "yPER",
    hidden: true,
    _mode: "per",
  }));

  // S&P 500 PER 参照ライン（trailing + forward、取得できた分のみ表示）
  const sp500Datasets = [];
  if (history.some(e => e["_SP500"]?.trailing_pe != null)) {
    sp500Datasets.push({
      label: "S&P500 PER(LTM)",
      data: history
        .filter(e => e["_SP500"]?.trailing_pe != null)
        .map(e => ({ x: e.date, y: e["_SP500"].trailing_pe })),
      borderColor: "#d97706",
      borderDash: [6, 3],
      borderWidth: 1.5,
      backgroundColor: "transparent",
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      yAxisID: "yPER",
      hidden: true,
      _mode: "per",
    });
  }
  if (history.some(e => e["_SP500"]?.forward_pe != null)) {
    sp500Datasets.push({
      label: "S&P500 PER(Fwd)",
      data: history
        .filter(e => e["_SP500"]?.forward_pe != null)
        .map(e => ({ x: e.date, y: e["_SP500"].forward_pe })),
      borderColor: "#fbbf24",
      borderDash: [6, 3],
      borderWidth: 1.5,
      backgroundColor: "transparent",
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      yAxisID: "yPER",
      hidden: true,
      _mode: "per",
    });
  }

  // 決算日アノテーション（データ期間内のみ表示）
  const annotations = {};
  const ed = (earningsDates || {})[symbol];
  const allDates = Object.values(periodArrays).flat().map(p => p.x);
  const dataMin = allDates.length ? allDates.reduce((a, b) => a < b ? a : b) : null;
  const dataMax = allDates.length ? allDates.reduce((a, b) => a > b ? a : b) : null;
  if (ed && dataMin && dataMax) {
    if (ed.prev && ed.prev >= dataMin && ed.prev <= dataMax) {
      annotations.prevEarnings = {
        type: "line", xMin: ed.prev, xMax: ed.prev,
        borderColor: "#f59e0b", borderWidth: 2, borderDash: [4, 4],
        label: { display: true, content: `前回決算 ${ed.prev}`, position: "start", backgroundColor: "#f59e0b", color: "#fff", font: { size: 10 }, padding: 3 },
      };
    }
  }

  // yPER の表示範囲を銘柄 + S&P500 全データから計算
  const allPerValues = [
    ...Object.values(perArrays).flat().map(p => p.y),
    ...["trailing_pe", "forward_pe"].flatMap(k =>
      history.filter(e => e["_SP500"]?.[k] != null).map(e => e["_SP500"][k])
    ),
  ].filter(v => v != null);
  const perMin = allPerValues.length ? Math.min(...allPerValues) : 0;
  const perMax = allPerValues.length ? Math.max(...allPerValues) : 100;
  const perPad = (perMax - perMin) * 0.1 || 5;

  const xMin = history[0]?.date;
  const xMax = history[history.length - 1]?.date;

  return new Chart(document.getElementById(canvasId), {
    type: "line",
    data: { datasets: [...epsDatasets, ...perDatasets, ...sp500Datasets] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return null;
              return ctx.dataset._mode === "per"
                ? `${ctx.dataset.label}: ${v.toFixed(1)}x`
                : `${ctx.dataset.label}: $${v.toFixed(2)}`;
            },
          },
        },
        annotation: { annotations },
      },
      scales: {
        x: {
          type: "time",
          min: xMin, max: xMax,
          time: { unit: "day", tooltipFormat: "yyyy-MM-dd", displayFormats: { day: "MM/dd" } },
          ticks: { maxTicksLimit: 12 },
        },
        yQ: {
          position: "left",
          title: { display: true, text: "四半期 EPS ($)" },
          ticks: { callback: v => "$" + v.toFixed(2) },
        },
        yA: {
          position: "right",
          title: { display: true, text: "年間 EPS ($)" },
          ticks: { callback: v => "$" + v.toFixed(2) },
          grid: { drawOnChartArea: false },
        },
        yPER: {
          position: "right",
          display: false,
          min: Math.floor(perMin - perPad),
          max: Math.ceil(perMax + perPad),
          title: { display: true, text: "PER (x)" },
          ticks: { callback: v => v.toFixed(1) + "x" },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

function switchChartMode(chart, mode) {
  chart.data.datasets.forEach(ds => {
    ds.hidden = ds._mode !== mode;
  });
  chart.options.scales.yQ.display = mode === "eps";
  chart.options.scales.yA.display = mode === "eps";
  chart.options.scales.yPER.display = mode === "per";
  chart.update();
}

function syncChartAreas(epsChart, priceChart) {
  if (!epsChart || !priceChart) return;
  requestAnimationFrame(() => {
    const a1 = epsChart.chartArea, a2 = priceChart.chartArea;
    if (!a1 || !a2) return;
    const left  = Math.max(a1.left, a2.left);
    const right1 = epsChart.width   - a1.right;
    const right2 = priceChart.width - a2.right;
    const right  = Math.max(right1, right2);
    const pad = c => { c.options.layout = c.options.layout || {}; c.options.layout.padding = c.options.layout.padding || {}; };
    pad(epsChart);   epsChart.options.layout.padding.left   = left - a1.left;  epsChart.options.layout.padding.right   = right - right1;
    pad(priceChart); priceChart.options.layout.padding.left = left - a2.left;  priceChart.options.layout.padding.right = right - right2;
    epsChart.update("none");
    priceChart.update("none");
  });
}

function buildCard(symbol, history, earningsDates, perData, names) {
  const canvasId = `chart-${symbol}`;
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.symbol = symbol;

  const latestEntry = history[history.length - 1];
  const lastSymbolEntry = latestEntry[symbol] || {};
  const epsPeriods = Object.keys(lastSymbolEntry).filter(k => !OHLC_KEYS.has(k) && PERIOD_LABELS[k]);
  const PER_LABELS = { trailing_pe: "PER(LTM)", forward_pe: "Forward PER" };
  const PER_COLORS = { trailing_pe: "#7c3aed", forward_pe: "#0891b2" };

  const epsLegendHtml = epsPeriods.map((p, i) => `
    <span class="legend-item" data-canvas="${canvasId}" data-idx="${i}">
      <span class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></span>
      ${PERIOD_LABELS[p] || p}
    </span>`).join("");

  const PER_COLORS_CARD = { trailing_pe: "#7c3aed", forward_pe: "#0891b2" };
  const SP500_COLORS = { trailing_pe: "#d97706", forward_pe: "#fbbf24" };
  const sp500LegendItems = [
    { key: "trailing_pe", label: "S&P500 PER(LTM)" },
    { key: "forward_pe",  label: "S&P500 PER(Fwd)" },
  ].map(({ key, label }, j) => `
    <span class="legend-item" data-canvas="${canvasId}" data-idx="${epsPeriods.length + 2 + j}">
      <span class="legend-dot" style="background:${SP500_COLORS[key]}"></span>
      ${label}
    </span>`);
  const perLegendHtml = [
    ...Object.entries(PER_LABELS).map(([k, label], i) => `
      <span class="legend-item" data-canvas="${canvasId}" data-idx="${epsPeriods.length + i}">
        <span class="legend-dot" style="background:${PER_COLORS_CARD[k]}"></span>
        ${label}
      </span>`),
    ...sp500LegendItems,
  ].join("");

  card.innerHTML = `
    <div class="card-header">
      <h2>${symbol}</h2>
      ${(names && names[symbol]) ? `<span class="company-name">${names[symbol]}</span>` : ""}
      ${analystBadge(symbol, perData)}
      ${earningsBadge(symbol, earningsDates)}
    </div>
    <div class="chart-toggle">
      <button class="active" data-mode="eps" data-canvas="${canvasId}">EPS</button>
      <button data-mode="per" data-canvas="${canvasId}">PER</button>
    </div>
    <div class="legend" data-legend="eps-${canvasId}">${epsLegendHtml}</div>
    <div class="legend" data-legend="per-${canvasId}" style="display:none">${perLegendHtml}</div>
    <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>`;
  card.appendChild(buildPriceSection(symbol));
  return card;
}

Promise.all([
  fetch("data/history.json").then(r => r.json()),
  fetch("data/earnings_dates.json").then(r => r.json()).catch(() => ({ dates: {}, per: {} })),
]).then(([history, edData]) => {
  if (!history.length) throw new Error("データがありません");

  const earningsDates = edData.dates || {};
  const perData = edData.per || {};
  const names = edData.names || {};
  const lastEntry = history[history.length - 1];
  const symbols = Object.keys(lastEntry).filter(k => k !== "date" && !k.startsWith("_"));

  document.getElementById("subtitle").textContent =
    `最終更新: ${lastEntry.date}　全${history.length}日分のデータ`;

  const main = document.getElementById("main");
  main.innerHTML = "";

  // サマリーテーブル
  // 次回決算日が近い順に並び替え（未設定は末尾）
  symbols.sort((a, b) => {
    const da = earningsDates[a]?.next;
    const db = earningsDates[b]?.next;
    if (da && db) return da < db ? -1 : da > db ? 1 : 0;
    if (da) return -1;
    if (db) return 1;
    return 0;
  });

  const { wrap: tableWrap, tbody } = buildSummaryTable(symbols, history, earningsDates, perData);

  // 2カラムレイアウト（左：グラフ / 右：テーブル）
  const layout = document.createElement("div");
  layout.className = "layout";
  const chartCol = document.createElement("div");
  chartCol.className = "chart-col";
  const tableCol = document.createElement("div");
  tableCol.className = "table-col";
  layout.append(chartCol, tableCol);
  main.appendChild(layout);

  // チャートカードを全件生成・チャート描画
  symbols.forEach((symbol, i) => {
    const card = buildCard(symbol, history, earningsDates, perData, names);
    if (i === 0) card.classList.add("active");
    chartCol.appendChild(card);
    const epsChart   = buildChart(`chart-${symbol}`, history, symbol, earningsDates);
    const priceChart = buildPriceChart(symbol, history, earningsDates);
    syncChartAreas(epsChart, priceChart);
  });

  tableCol.appendChild(tableWrap);

  // テーブル行クリックで切り替え
  tbody.addEventListener("click", e => {
    const tr = e.target.closest("tr");
    if (!tr) return;
    const target = tr.dataset.symbol;
    tbody.querySelectorAll("tr").forEach(r => r.classList.toggle("active", r.dataset.symbol === target));
    main.querySelectorAll(".card").forEach(c => c.classList.toggle("active", c.dataset.symbol === target));
    const epsChart   = Chart.getChart(`chart-${target}`);
    const priceChart = Chart.getChart(`price-${target}`);
    if (epsChart)   epsChart.resize();
    if (priceChart) { priceChart.resize(); syncChartAreas(epsChart, priceChart); }
  });

  // EPS/PER トグルボタン
  main.addEventListener("click", e => {
    const btn = e.target.closest(".chart-toggle button[data-mode]");
    if (!btn) return;
    const mode = btn.dataset.mode;
    const canvasId = btn.dataset.canvas;
    const chart = Chart.getChart(canvasId);
    if (!chart) return;
    btn.closest(".chart-toggle").querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
    switchChartMode(chart, mode);
    const symbol = canvasId.replace(/^chart-/, "");
    syncChartAreas(chart, Chart.getChart(`price-${symbol}`));
    const card = btn.closest(".card");
    card.querySelector(`[data-legend="eps-${canvasId}"]`).style.display = mode === "eps" ? "" : "none";
    card.querySelector(`[data-legend="per-${canvasId}"]`).style.display = mode === "per" ? "" : "none";
  });

  // 凡例クリック（イベント委譲：遅延生成された要素にも対応）
  main.addEventListener("click", e => {
    const item = e.target.closest(".legend-item[data-idx]");
    if (!item) return;
    const chart = Chart.getChart(item.dataset.canvas);
    if (!chart) return;
    const idx = parseInt(item.dataset.idx);
    const meta = chart.getDatasetMeta(idx);
    meta.hidden = !meta.hidden;
    item.style.opacity = meta.hidden ? "0.4" : "1";
    chart.update();
  });
}).catch(e => {
  document.getElementById("main").innerHTML =
    `<p class="error">読み込みに失敗しました: ${e.message}<br>GitHub Actions でデータを取得してから再度アクセスしてください。</p>`;
});
</script>
</body>
</html>
