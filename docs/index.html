<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPS Consensus Trend</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1.2rem 2rem; }
    header h1 { font-size: 1.4rem; }
    header p  { font-size: 0.8rem; opacity: 0.7; margin-top: 0.3rem; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 2rem; padding: 1.5rem; }
    .card-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.05rem; }
    .badge {
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 999px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    }
    .badge.soon { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .badge.per  { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }

    .chart-wrap { position: relative; height: 280px; }

    .legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; cursor: pointer; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    #loading { text-align: center; padding: 3rem; color: #666; }
    .error { color: #c0392b; padding: 2rem; }
  </style>
</head>
<body>
<header>
  <h1>EPS Consensus Trend</h1>
  <p id="subtitle">読み込み中...</p>
</header>
<main id="main">
  <div id="loading">データを読み込んでいます...</div>
</main>

<script>
const PERIOD_LABELS = { "0q": "今四半期", "+1q": "来四半期", "0y": "今年度", "+1y": "来年度" };
const COLORS = ["#2563eb", "#16a34a", "#dc2626", "#d97706", "#7c3aed", "#0891b2"];
const PRICE_COLOR = "#f59e0b";

function daysUntil(dateStr) {
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function earningsBadge(symbol, earningsDates) {
  const d = earningsDates[symbol];
  if (!d) return "";
  const days = daysUntil(d);
  const label = days < 0
    ? `決算済 ${d}`
    : days === 0
    ? `本日決算 ${d}`
    : `次回決算 ${d}（${days}日後）`;
  const cls = days >= 0 && days <= 14 ? "badge soon" : "badge";
  return `<span class="${cls}">${label}</span>`;
}

function perBadges(symbol, perData) {
  const p = (perData || {})[symbol];
  if (!p) return "";
  let html = "";
  if (p.trailing != null) html += `<span class="badge per">PER (LTM) ${p.trailing}x</span>`;
  if (p.forward  != null) html += `<span class="badge per">Forward PER ${p.forward}x</span>`;
  if (p.analysts != null) html += `<span class="badge">アナリスト ${p.analysts}人</span>`;
  return html;
}

function buildChart(canvasId, dates, periodData) {
  const epsPeriods = Object.keys(periodData).filter(p => p !== "prev_close");
  const datasets = epsPeriods.map((period, i) => ({
    label: PERIOD_LABELS[period] || period,
    data: periodData[period],
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + "22",
    tension: 0.3,
    pointRadius: 4,
    pointHoverRadius: 6,
    yAxisID: "y",
  }));

  if (periodData["prev_close"]) {
    datasets.push({
      label: "前日終値",
      data: periodData["prev_close"],
      borderColor: PRICE_COLOR,
      backgroundColor: PRICE_COLOR + "22",
      borderDash: [5, 4],
      tension: 0.3,
      pointRadius: 4,
      pointHoverRadius: 6,
      yAxisID: "y2",
    });
  }

  return new Chart(document.getElementById(canvasId), {
    type: "line",
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.yAxisID === "y2"
              ? `${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(2) ?? "-"}`
              : `${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(2) ?? "-"}`,
          },
        },
      },
      scales: {
        x: { ticks: { maxTicksLimit: 12 } },
        y: {
          position: "left",
          title: { display: true, text: "EPS ($)" },
          ticks: { callback: v => "$" + v.toFixed(2) },
        },
        y2: {
          position: "right",
          title: { display: true, text: "株価 ($)" },
          ticks: { callback: v => "$" + v.toFixed(0) },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

function buildCard(symbol, dates, periodData, earningsDates, perData) {
  const canvasId = `chart-${symbol}`;
  const card = document.createElement("div");
  card.className = "card";

  const epsPeriods = Object.keys(periodData).filter(p => p !== "prev_close");
  const allPeriods = [...epsPeriods, ...(periodData["prev_close"] ? ["prev_close"] : [])];
  const legendHtml = allPeriods.map((p, i) => {
    const color = p === "prev_close" ? PRICE_COLOR : COLORS[epsPeriods.indexOf(p) % COLORS.length];
    const dotStyle = p === "prev_close"
      ? `background:repeating-linear-gradient(90deg,${color} 0 5px,transparent 5px 9px)`
      : `background:${color}`;
    return `<span class="legend-item" data-canvas="${canvasId}" data-idx="${i}">
      <span class="legend-dot" style="${dotStyle}"></span>
      ${p === "prev_close" ? "前日終値" : (PERIOD_LABELS[p] || p)}
    </span>`;
  }).join("");

  card.innerHTML = `
    <div class="card-header">
      <h2>${symbol}</h2>
      ${earningsBadge(symbol, earningsDates)}
      ${perBadges(symbol, perData)}
    </div>
    <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
    <div class="legend">${legendHtml}</div>`;
  return card;
}

Promise.all([
  fetch("data/history.json").then(r => r.json()),
  fetch("data/earnings_dates.json").then(r => r.json()).catch(() => ({ dates: {} })),
]).then(([history, edData]) => {
  if (!history.length) throw new Error("データがありません");

  const earningsDates = edData.dates || {};
  const perData = edData.per || {};
  const dates = history.map(e => e.date);
  const lastEntry = history[history.length - 1];
  const symbols = Object.keys(lastEntry).filter(k => k !== "date");

  document.getElementById("subtitle").textContent =
    `最終更新: ${lastEntry.date}　全${history.length}日分のデータ`;

  const main = document.getElementById("main");
  main.innerHTML = "";

  symbols.forEach(symbol => {
    const periods = {};
    history.forEach((entry, i) => {
      if (!entry[symbol]) return;
      Object.entries(entry[symbol]).forEach(([period, val]) => {
        if (!periods[period]) periods[period] = Array(history.length).fill(null);
        periods[period][i] = val;
      });
    });

    const card = buildCard(symbol, dates, periods, earningsDates, perData);
    main.appendChild(card);
    buildChart(`chart-${symbol}`, dates, periods);
  });

  document.querySelectorAll(".legend-item").forEach(item => {
    item.addEventListener("click", () => {
      const chart = Chart.getChart(item.dataset.canvas);
      const idx = parseInt(item.dataset.idx);
      const meta = chart.getDatasetMeta(idx);
      meta.hidden = !meta.hidden;
      item.style.opacity = meta.hidden ? "0.4" : "1";
      chart.update();
    });
  });
}).catch(e => {
  document.getElementById("main").innerHTML =
    `<p class="error">読み込みに失敗しました: ${e.message}<br>GitHub Actions でデータを取得してから再度アクセスしてください。</p>`;
});
</script>
</body>
</html>
