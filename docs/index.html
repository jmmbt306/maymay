<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>米国株 EPS トレンド</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1.2rem 2rem; }
    header h1 { font-size: 1.4rem; }
    header p  { font-size: 0.8rem; opacity: 0.7; margin-top: 0.3rem; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 2rem; padding: 1.5rem; }
    .card h2 { font-size: 1.05rem; margin-bottom: 1rem; }

    .chart-wrap { position: relative; height: 280px; }

    .legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; cursor: pointer; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    #loading { text-align: center; padding: 3rem; color: #666; }
    .error { color: #c0392b; padding: 2rem; }
  </style>
</head>
<body>
<header>
  <h1>米国株 EPS トレンド推移</h1>
  <p id="subtitle">読み込み中...</p>
</header>
<main id="main">
  <div id="loading">データを読み込んでいます...</div>
</main>

<script>
const PERIOD_LABELS = { "0q": "今四半期", "+1q": "来四半期", "0y": "今年度", "+1y": "来年度" };
const COLORS = ["#2563eb", "#16a34a", "#dc2626", "#d97706", "#7c3aed", "#0891b2"];

function buildChart(canvasId, dates, periodData) {
  const datasets = Object.entries(periodData).map(([period, values], i) => ({
    label: PERIOD_LABELS[period] || period,
    data: values,
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + "22",
    tension: 0.3,
    pointRadius: 4,
    pointHoverRadius: 6,
  }));

  return new Chart(document.getElementById(canvasId), {
    type: "line",
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y ?? "-"}`,
          },
        },
      },
      scales: {
        x: { ticks: { maxTicksLimit: 12 } },
        y: {
          title: { display: true, text: "EPS ($)" },
          ticks: { callback: v => "$" + v.toFixed(2) },
        },
      },
    },
  });
}

function buildCard(symbol, dates, periodData) {
  const canvasId = `chart-${symbol}`;
  const card = document.createElement("div");
  card.className = "card";

  const periods = Object.keys(periodData);
  const legendHtml = periods.map((p, i) => `
    <span class="legend-item" data-canvas="${canvasId}" data-idx="${i}">
      <span class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></span>
      ${PERIOD_LABELS[p] || p}
    </span>`).join("");

  card.innerHTML = `
    <h2>${symbol}</h2>
    <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
    <div class="legend">${legendHtml}</div>`;
  return card;
}

fetch("data/history.json")
  .then(r => r.json())
  .then(history => {
    if (!history.length) throw new Error("データがありません");

    const dates = history.map(e => e.date);
    const lastEntry = history[history.length - 1];
    const symbols = Object.keys(lastEntry).filter(k => k !== "date");

    document.getElementById("subtitle").textContent =
      `最終更新: ${lastEntry.date}　全${history.length}日分のデータ`;

    const main = document.getElementById("main");
    main.innerHTML = "";

    symbols.forEach(symbol => {
      // 期間ごとに日付順の値を集める
      const periods = {};
      history.forEach(entry => {
        if (!entry[symbol]) return;
        Object.entries(entry[symbol]).forEach(([period, val]) => {
          if (!periods[period]) periods[period] = Array(history.length).fill(null);
          periods[period][history.indexOf(entry)] = val;
        });
      });

      const card = buildCard(symbol, dates, periods);
      main.appendChild(card);
      buildChart(`chart-${symbol}`, dates, periods);
    });

    // 凡例クリックでラインの表示/非表示を切り替え
    document.querySelectorAll(".legend-item").forEach(item => {
      item.addEventListener("click", () => {
        const chart = Chart.getChart(item.dataset.canvas);
        const idx = parseInt(item.dataset.idx);
        const meta = chart.getDatasetMeta(idx);
        meta.hidden = !meta.hidden;
        item.style.opacity = meta.hidden ? "0.4" : "1";
        chart.update();
      });
    });
  })
  .catch(e => {
    document.getElementById("main").innerHTML =
      `<p class="error">読み込みに失敗しました: ${e.message}<br>GitHub Actions でデータを取得してから再度アクセスしてください。</p>`;
  });
</script>
</body>
</html>
