<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPS FETCH</title>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1.2rem 2rem; }
    header h1 { font-size: 1.4rem; }
    header p  { font-size: 0.8rem; opacity: 0.7; margin-top: 0.3rem; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    /* サマリーテーブル */
    .summary-card {
      background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 1.5rem; overflow-x: auto;
    }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .summary-table th {
      background: #1a1a2e; color: #fff; padding: 0.6rem 1rem;
      text-align: right; font-weight: 500; white-space: nowrap;
    }
    .summary-table th:first-child { text-align: left; }
    .summary-table td {
      padding: 0.65rem 1rem; border-bottom: 1px solid #f0f0f0;
      text-align: right; white-space: nowrap;
    }
    .summary-table td:first-child { text-align: left; font-weight: 600; }
    .summary-table tr { cursor: pointer; transition: background 0.12s; }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table tr:hover td { background: #eff6ff; }
    .summary-table tr.active td { background: #dbeafe; }
    .up   { color: #16a34a; font-weight: 600; }
    .down { color: #dc2626; font-weight: 600; }
    .diff { font-size: 0.75rem; margin-left: 0.3rem; opacity: 0.85; }

    /* チャートカード */
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 2rem; padding: 1.5rem; display: none; }
    .card.active { display: block; }
    .card-header { display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.05rem; margin-right: 0.4rem; }
    .badge {
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 999px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    }
    .badge.analyst { background: #fdf2f8; color: #9d174d; border-color: #f9a8d4; }
    .badge.soon { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .badge.per  { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }

    .chart-wrap { height: 300px; }
    .chart-toggle { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
    .chart-toggle button {
      padding: 0.25rem 0.8rem; border-radius: 5px; border: 1.5px solid #d1d5db;
      background: #fff; color: #374151; font-size: 0.8rem; cursor: pointer;
    }
    .chart-toggle button.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

    .tv-section { margin-top: 1.5rem; border-top: 1px solid #e5e7eb; padding-top: 1.2rem; }
    .tv-section h3 { font-size: 0.85rem; color: #666; margin-bottom: 0.8rem; }
    .tv-widget-container { height: 800px; }
    .tv-load-btn {
      display: inline-block; padding: 0.4rem 1rem; border-radius: 6px;
      border: 1.5px solid #bfdbfe; background: #fff; color: #1d4ed8;
      font-size: 0.85rem; cursor: pointer;
    }
    .tv-load-btn:hover { background: #eff6ff; }

    .legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; cursor: pointer; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    #loading { text-align: center; padding: 3rem; color: #666; }
    .error { color: #c0392b; padding: 2rem; }
  </style>
</head>
<body>
<header>
  <h1>EPS FETCH</h1>
  <p id="subtitle">読み込み中...</p>
</header>
<main id="main">
  <div id="loading">データを読み込んでいます...</div>
</main>

<script>
const PERIOD_LABELS = { "0q": "今四半期", "+1q": "来四半期", "0y": "今年度", "+1y": "来年度" };
const PERIODS = ["0q", "+1q", "0y", "+1y"];
const COLORS = ["#2563eb", "#16a34a", "#dc2626", "#d97706", "#7c3aed", "#0891b2"];
const OHLC_KEYS = new Set(["o", "h", "l", "c", "prev_close", "trailing_pe", "forward_pe"]);

function daysUntil(dateStr) {
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}

function earningsBadge(symbol, earningsDates) {
  const e = earningsDates[symbol];
  if (!e) return "";
  let html = "";
  if (e.prev) html += `<span class="badge">前回決算 ${e.prev}</span>`;
  if (e.next) {
    const days = daysUntil(e.next);
    const label = days < 0 ? `決算済 ${e.next}` : days === 0 ? `本日決算 ${e.next}` : `次回決算 ${e.next}（${days}日後）`;
    html += `<span class="${days >= 0 && days <= 14 ? "badge soon" : "badge"}">${label}</span>`;
  }
  return html;
}

function perBadges(symbol, latestEntry, perData) {
  const entry = latestEntry[symbol] || {};
  const trailing = entry.trailing_pe ?? (perData[symbol] || {}).trailing ?? null;
  const forward  = entry.forward_pe  ?? (perData[symbol] || {}).forward  ?? null;
  let html = "";
  if (trailing != null) html += `<span class="badge per">PER (LTM) ${trailing}x</span>`;
  if (forward  != null) html += `<span class="badge per">Forward PER ${forward}x</span>`;
  return html;
}

function analystBadge(symbol, perData) {
  const p = (perData || {})[symbol];
  if (!p || p.analysts == null) return "";
  return `<span class="badge analyst">アナリスト ${p.analysts}人</span>`;
}

function buildSummaryTable(symbols, history, earningsDates, perData) {
  const last = history[history.length - 1];

  // 各銘柄ごとに、直近のデータがある1つ前のエントリを探す
  function getPrevEntry(symbol) {
    for (let i = history.length - 2; i >= 0; i--) {
      if (history[i][symbol]) return history[i];
    }
    return null;
  }

  const wrap = document.createElement("div");
  wrap.className = "summary-card";

  const table = document.createElement("table");
  table.className = "summary-table";

  // ヘッダー
  const thead = document.createElement("thead");
  thead.innerHTML = `<tr>
    <th>銘柄</th>
    <th>次回決算</th>
    ${PERIODS.map(p => `<th>${PERIOD_LABELS[p] || p}</th>`).join("")}
  </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  symbols.forEach((symbol, i) => {
    const cur = last[symbol] || {};
    const prevEntry = getPrevEntry(symbol);
    const pre = prevEntry ? (prevEntry[symbol] || {}) : {};
    const prevDate = prevEntry ? prevEntry.date : null;
    const tr = document.createElement("tr");
    if (i === 0) tr.classList.add("active");
    tr.dataset.symbol = symbol;

    const tdSymbol = document.createElement("td");
    tdSymbol.textContent = symbol;
    tr.appendChild(tdSymbol);

    // 次回決算日
    const ed = (earningsDates || {})[symbol] || {};
    const tdNext = document.createElement("td");
    if (ed.next) {
      const days = daysUntil(ed.next);
      tdNext.textContent = days < 0 ? ed.next : `${ed.next}（${days}日後）`;
      if (days >= 0 && days <= 14) tdNext.style.color = "#dc2626";
    } else {
      tdNext.textContent = "—";
    }
    tr.appendChild(tdNext);

    PERIODS.forEach(period => {
      const td = document.createElement("td");
      const val = cur[period];
      const preVal = pre[period];
      if (val == null) {
        td.textContent = "—";
      } else {
        const formatted = `$${val.toFixed(2)}`;
        const titleBase = prevDate ? `前回(${prevDate}): ${preVal != null ? "$" + preVal.toFixed(2) : "なし"}` : "比較データなし";
        td.title = titleBase;
        if (preVal != null && Math.abs(val - preVal) >= 0.001) {
          const diff = val - preVal;
          const sign = diff > 0 ? "+" : "";
          td.className = diff > 0 ? "up" : "down";
          td.innerHTML = `${formatted}<span class="diff">(${sign}${diff.toFixed(2)})</span>`;
        } else {
          td.textContent = formatted;
        }
      }
      tr.appendChild(td);
    });


    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  // 診断: 比較基準日を表示
  const firstSymbol = symbols[0];
  const diagEntry = getPrevEntry(firstSymbol);
  const info = document.createElement("p");
  info.style.cssText = "font-size:0.75rem;color:#888;padding:0.5rem 1rem;";
  if (diagEntry) {
    info.textContent = `前回比較: ${diagEntry.date} → ${last.date}（全 ${history.length} 日分）`;
  } else {
    info.textContent = `比較データなし（全 ${history.length} 日分 / データが1日分のみ）`;
  }

  wrap.appendChild(table);
  wrap.appendChild(info);
  return { wrap, tbody };
}

function buildTradingViewSection(symbol) {
  const section = document.createElement("div");
  section.className = "tv-section";

  const btn = document.createElement("button");
  btn.className = "tv-load-btn";
  btn.textContent = "TradingView で株価チャートを表示";
  btn.addEventListener("click", () => {
    btn.remove();
    const container = document.createElement("div");
    container.className = "tradingview-widget-container tv-widget-container";
    const widgetDiv = document.createElement("div");
    widgetDiv.className = "tradingview-widget-container__widget";
    widgetDiv.style.height = "100%";
    container.appendChild(widgetDiv);
    const script = document.createElement("script");
    script.type = "text/javascript";
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    script.async = true;
    script.textContent = JSON.stringify({
      autosize: true, symbol, interval: "D", range: "3M",
      timezone: "America/New_York", theme: "light",
      style: "1", locale: "ja", allow_symbol_change: false, calendar: false,
    });
    container.appendChild(script);
    section.appendChild(container);
  });
  section.appendChild(btn);
  return section;
}

function buildChart(canvasId, history, symbol, earningsDates) {
  const periodArrays = {};
  const perArrays = { trailing_pe: [], forward_pe: [] };

  history.forEach(entry => {
    const d = entry[symbol];
    if (!d) return;
    Object.entries(d).forEach(([k, v]) => {
      if (k === "trailing_pe" || k === "forward_pe") {
        if (v !== null) perArrays[k].push({ x: entry.date, y: v });
      } else if (!OHLC_KEYS.has(k)) {
        if (!periodArrays[k]) periodArrays[k] = [];
        if (v !== null) periodArrays[k].push({ x: entry.date, y: v });
      }
    });
  });

  const QUARTERLY = new Set(["0q", "+1q"]);
  const epsDatasets = Object.entries(periodArrays).map(([period, data], i) => ({
    label: PERIOD_LABELS[period] || period,
    data,
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + "22",
    tension: 0.3, pointRadius: 4, pointHoverRadius: 6,
    yAxisID: QUARTERLY.has(period) ? "yQ" : "yA",
    _mode: "eps",
  }));

  const PER_COLORS = { trailing_pe: "#7c3aed", forward_pe: "#0891b2" };
  const PER_LABELS = { trailing_pe: "PER(LTM)", forward_pe: "Forward PER" };
  const perDatasets = Object.entries(perArrays).map(([k, data]) => ({
    label: PER_LABELS[k],
    data,
    borderColor: PER_COLORS[k],
    backgroundColor: PER_COLORS[k] + "22",
    tension: 0.3, pointRadius: 4, pointHoverRadius: 6,
    yAxisID: "yPER",
    hidden: true,
    _mode: "per",
  }));

  // 決算日アノテーション（データ期間内のみ表示）
  const annotations = {};
  const ed = (earningsDates || {})[symbol];
  const allDates = Object.values(periodArrays).flat().map(p => p.x);
  const dataMin = allDates.length ? allDates.reduce((a, b) => a < b ? a : b) : null;
  const dataMax = allDates.length ? allDates.reduce((a, b) => a > b ? a : b) : null;
  if (ed && dataMin && dataMax) {
    if (ed.prev && ed.prev >= dataMin && ed.prev <= dataMax) {
      annotations.prevEarnings = {
        type: "line", xMin: ed.prev, xMax: ed.prev,
        borderColor: "#f59e0b", borderWidth: 2, borderDash: [4, 4],
        label: { display: true, content: `前回決算 ${ed.prev}`, position: "start", backgroundColor: "#f59e0b", color: "#fff", font: { size: 10 }, padding: 3 },
      };
    }
    if (ed.next && ed.next >= dataMin && ed.next <= dataMax) {
      annotations.nextEarnings = {
        type: "line", xMin: ed.next, xMax: ed.next,
        borderColor: "#6366f1", borderWidth: 2, borderDash: [4, 4],
        label: { display: true, content: `次回決算 ${ed.next}`, position: "end", backgroundColor: "#6366f1", color: "#fff", font: { size: 10 }, padding: 3 },
      };
    }
  }

  return new Chart(document.getElementById(canvasId), {
    type: "line",
    data: { datasets: [...epsDatasets, ...perDatasets] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return null;
              return ctx.dataset._mode === "per"
                ? `${ctx.dataset.label}: ${v.toFixed(1)}x`
                : `${ctx.dataset.label}: $${v.toFixed(2)}`;
            },
          },
        },
        annotation: { annotations },
      },
      scales: {
        x: {
          type: "time",
          time: { unit: "day", tooltipFormat: "yyyy-MM-dd", displayFormats: { day: "MM/dd" } },
          ticks: { maxTicksLimit: 12 },
        },
        yQ: {
          position: "left",
          title: { display: true, text: "四半期 EPS ($)" },
          ticks: { callback: v => "$" + v.toFixed(2) },
        },
        yA: {
          position: "right",
          title: { display: true, text: "年間 EPS ($)" },
          ticks: { callback: v => "$" + v.toFixed(2) },
          grid: { drawOnChartArea: false },
        },
        yPER: {
          position: "right",
          display: false,
          title: { display: true, text: "PER (x)" },
          ticks: { callback: v => v.toFixed(1) + "x" },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

function switchChartMode(chart, mode) {
  chart.data.datasets.forEach(ds => {
    ds.hidden = ds._mode !== mode;
  });
  chart.options.scales.yQ.display = mode === "eps";
  chart.options.scales.yA.display = mode === "eps";
  chart.options.scales.yPER.display = mode === "per";
  chart.update();
}

function buildCard(symbol, history, earningsDates, perData) {
  const canvasId = `chart-${symbol}`;
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.symbol = symbol;

  const latestEntry = history[history.length - 1];
  const lastSymbolEntry = latestEntry[symbol] || {};
  const epsPeriods = Object.keys(lastSymbolEntry).filter(k => !OHLC_KEYS.has(k));
  const PER_LABELS = { trailing_pe: "PER(LTM)", forward_pe: "Forward PER" };
  const PER_COLORS = { trailing_pe: "#7c3aed", forward_pe: "#0891b2" };

  const epsLegendHtml = epsPeriods.map((p, i) => `
    <span class="legend-item" data-canvas="${canvasId}" data-idx="${i}">
      <span class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></span>
      ${PERIOD_LABELS[p] || p}
    </span>`).join("");

  const perLegendHtml = Object.entries(PER_LABELS).map(([k, label], i) => `
    <span class="legend-item" data-canvas="${canvasId}" data-idx="${epsPeriods.length + i}">
      <span class="legend-dot" style="background:${PER_COLORS[k]}"></span>
      ${label}
    </span>`).join("");

  card.innerHTML = `
    <div class="card-header">
      <h2>${symbol}</h2>
      ${analystBadge(symbol, perData)}
      ${earningsBadge(symbol, earningsDates)}
      ${perBadges(symbol, latestEntry, perData)}
    </div>
    <div class="chart-toggle">
      <button class="active" data-mode="eps" data-canvas="${canvasId}">EPS</button>
      <button data-mode="per" data-canvas="${canvasId}">PER</button>
    </div>
    <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
    <div class="legend" data-legend="eps-${canvasId}">${epsLegendHtml}</div>
    <div class="legend" data-legend="per-${canvasId}" style="display:none">${perLegendHtml}</div>`;
  card.appendChild(buildTradingViewSection(symbol));
  return card;
}

Promise.all([
  fetch("data/history.json").then(r => r.json()),
  fetch("data/earnings_dates.json").then(r => r.json()).catch(() => ({ dates: {}, per: {} })),
]).then(([history, edData]) => {
  if (!history.length) throw new Error("データがありません");

  const earningsDates = edData.dates || {};
  const perData = edData.per || {};
  const lastEntry = history[history.length - 1];
  const symbols = Object.keys(lastEntry).filter(k => k !== "date");

  document.getElementById("subtitle").textContent =
    `最終更新: ${lastEntry.date}　全${history.length}日分のデータ`;

  const main = document.getElementById("main");
  main.innerHTML = "";

  // サマリーテーブル
  // 次回決算日が近い順に並び替え（未設定は末尾）
  symbols.sort((a, b) => {
    const da = earningsDates[a]?.next;
    const db = earningsDates[b]?.next;
    if (da && db) return da < db ? -1 : da > db ? 1 : 0;
    if (da) return -1;
    if (db) return 1;
    return 0;
  });

  const { wrap: tableWrap, tbody } = buildSummaryTable(symbols, history, earningsDates, perData);

  // チャートカードを全件生成・チャート描画
  symbols.forEach((symbol, i) => {
    const card = buildCard(symbol, history, earningsDates, perData);
    if (i === 0) card.classList.add("active");
    main.appendChild(card);
    buildChart(`chart-${symbol}`, history, symbol, earningsDates);
  });

  main.appendChild(tableWrap);

  // テーブル行クリックで切り替え
  tbody.addEventListener("click", e => {
    const tr = e.target.closest("tr");
    if (!tr) return;
    const target = tr.dataset.symbol;
    tbody.querySelectorAll("tr").forEach(r => r.classList.toggle("active", r.dataset.symbol === target));
    main.querySelectorAll(".card").forEach(c => c.classList.toggle("active", c.dataset.symbol === target));
    const chart = Chart.getChart(`chart-${target}`);
    if (chart) chart.resize();
  });

  // EPS/PER トグルボタン
  main.addEventListener("click", e => {
    const btn = e.target.closest(".chart-toggle button[data-mode]");
    if (!btn) return;
    const mode = btn.dataset.mode;
    const canvasId = btn.dataset.canvas;
    const chart = Chart.getChart(canvasId);
    if (!chart) return;
    btn.closest(".chart-toggle").querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
    switchChartMode(chart, mode);
    const card = btn.closest(".card");
    card.querySelector(`[data-legend="eps-${canvasId}"]`).style.display = mode === "eps" ? "" : "none";
    card.querySelector(`[data-legend="per-${canvasId}"]`).style.display = mode === "per" ? "" : "none";
  });

  // 凡例クリック（イベント委譲：遅延生成された要素にも対応）
  main.addEventListener("click", e => {
    const item = e.target.closest(".legend-item[data-idx]");
    if (!item) return;
    const chart = Chart.getChart(item.dataset.canvas);
    if (!chart) return;
    const idx = parseInt(item.dataset.idx);
    const meta = chart.getDatasetMeta(idx);
    meta.hidden = !meta.hidden;
    item.style.opacity = meta.hidden ? "0.4" : "1";
    chart.update();
  });
}).catch(e => {
  document.getElementById("main").innerHTML =
    `<p class="error">読み込みに失敗しました: ${e.message}<br>GitHub Actions でデータを取得してから再度アクセスしてください。</p>`;
});
</script>
</body>
</html>
